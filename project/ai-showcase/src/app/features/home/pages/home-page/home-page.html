<section class="space-y-8">
  <header class="rounded-lg border border-slate-800 bg-slate-900 p-6">
    <h1 class="text-3xl font-bold text-white">{{ facade.headline() }}</h1>
    <p class="mt-3 max-w-3xl text-slate-300">
      This single-page app highlights your complete multi-agent system for Angular, React, and Next.js. Each
      framework page explains architecture, workflow, agent roles, and delivery capabilities.
    </p>
  </header>

  <section>
    <h2 class="mb-4 text-xl font-semibold text-cyan-300">Framework summary</h2>
    <app-home-summary-grid [cards]="facade.cards()"></app-home-summary-grid>
  </section>
</section>
