<article class="rounded-lg border border-slate-800 bg-slate-900 p-5">
  <h3 class="text-lg font-semibold text-white">{{ profile().name }}</h3>
  <p class="mt-2 text-sm text-slate-300">{{ profile().summary }}</p>
  <p class="mt-3 text-xs text-slate-400">
    <span class="font-semibold text-slate-200">Architecture:</span>
    {{ profile().architectureModel }}
  </p>
  <a
    [routerLink]="['/', profile().slug]"
    class="mt-4 inline-block rounded bg-cyan-500 px-3 py-2 text-sm font-medium text-slate-900 hover:bg-cyan-400"
    >View details</a
  >
</article>
